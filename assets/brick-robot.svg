<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 260" width="220" height="260">
  <defs>
    <linearGradient id="bwTeal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22c3d6"/>
      <stop offset="1" stop-color="#0e9bb0"/>
    </linearGradient>
    <linearGradient id="bwAmber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffc14d"/>
      <stop offset="1" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="bwSlate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#46586e"/>
      <stop offset="1" stop-color="#37475a"/>
    </linearGradient>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="110" cy="246" rx="66" ry="10" fill="#000" opacity="0.12"/>

  <!-- antenna -->
  <rect x="105" y="20" width="10" height="20" rx="3" fill="#0e9bb0"/>
  <circle cx="110" cy="16" r="9" fill="url(#bwAmber)" stroke="#e0901a" stroke-width="2"/>

  <!-- ===== HEAD brick ===== -->
  <!-- studs on top -->
  <g fill="url(#bwTeal)" stroke="#0e9bb0" stroke-width="2">
    <ellipse cx="82" cy="44" rx="12" ry="7"/>
    <ellipse cx="138" cy="44" rx="12" ry="7"/>
  </g>
  <rect x="56" y="46" width="108" height="66" rx="12" fill="url(#bwTeal)" stroke="#0b8497" stroke-width="2"/>
  <!-- face plate -->
  <rect x="68" y="58" width="84" height="42" rx="9" fill="#0c3a44"/>
  <!-- eyes -->
  <circle cx="90" cy="79" r="9" fill="#ffffff"/>
  <circle cx="130" cy="79" r="9" fill="#ffffff"/>
  <circle cx="92" cy="80" r="4.5" fill="#0c3a44"/>
  <circle cx="132" cy="80" r="4.5" fill="#0c3a44"/>
  <!-- smile -->
  <path d="M96 92 q14 10 28 0" fill="none" stroke="#ffc14d" stroke-width="3.5" stroke-linecap="round"/>

  <!-- neck -->
  <rect x="94" y="112" width="32" height="12" rx="3" fill="url(#bwSlate)"/>

  <!-- ===== ARMS (brick segments) ===== -->
  <g stroke="#c8871a" stroke-width="2">
    <rect x="24" y="132" width="26" height="20" rx="6" fill="url(#bwAmber)"/>
    <rect x="24" y="156" width="26" height="26" rx="6" fill="url(#bwAmber)"/>
    <rect x="170" y="132" width="26" height="20" rx="6" fill="url(#bwAmber)"/>
    <rect x="170" y="156" width="26" height="26" rx="6" fill="url(#bwAmber)"/>
  </g>
  <!-- claws -->
  <circle cx="37" cy="190" r="9" fill="url(#bwSlate)" stroke="#2a3746" stroke-width="2"/>
  <circle cx="183" cy="190" r="9" fill="url(#bwSlate)" stroke="#2a3746" stroke-width="2"/>

  <!-- ===== BODY brick ===== -->
  <!-- studs on top -->
  <g fill="url(#bwAmber)" stroke="#c8871a" stroke-width="2">
    <ellipse cx="80" cy="128" rx="11" ry="6.5"/>
    <ellipse cx="110" cy="128" rx="11" ry="6.5"/>
    <ellipse cx="140" cy="128" rx="11" ry="6.5"/>
  </g>
  <rect x="60" y="130" width="100" height="76" rx="12" fill="url(#bwAmber)" stroke="#c8871a" stroke-width="2"/>
  <!-- chest screen showing code -->
  <rect x="74" y="146" width="72" height="44" rx="7" fill="#0c3a44"/>
  <text x="110" y="175" font-family="ui-monospace, Menlo, monospace" font-size="24" font-weight="700"
        fill="#22c3d6" text-anchor="middle">&lt;/&gt;</text>

  <!-- ===== LEGS (brick segments) ===== -->
  <g stroke="#0b8497" stroke-width="2">
    <rect x="72" y="206" width="26" height="30" rx="6" fill="url(#bwTeal)"/>
    <rect x="122" y="206" width="26" height="30" rx="6" fill="url(#bwTeal)"/>
  </g>
  <!-- feet -->
  <rect x="64" y="234" width="40" height="14" rx="5" fill="url(#bwSlate)" stroke="#2a3746" stroke-width="2"/>
  <rect x="116" y="234" width="40" height="14" rx="5" fill="url(#bwSlate)" stroke="#2a3746" stroke-width="2"/>
</svg>
