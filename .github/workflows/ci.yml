name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md']
  pull_request:
    paths-ignore: ['**.md']
  workflow_dispatch:

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit + VM tests
        run: npm test

      - name: Build
        run: npm run build

  browser:
    name: Browser render tests (WebGL)
    runs-on: ubuntu-latest
    # Headless-WebGL rendering can be environment-flaky; keep it visible but
    # don't let it red the whole workflow.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Render tests
        run: npm run test:browser
